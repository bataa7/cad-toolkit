# WireGuard Server Configuration
# Path: /etc/wireguard/wg0.conf

[Interface]
# Server Private Key (Generate with `wg genkey`)
PrivateKey = YOUR_SERVER_PRIVATE_KEY_HERE=
# Server Listening Port (UDP)
ListenPort = 51820
# Server VPN IP Address (Internal Network)
Address = 10.100.0.1/24

# PostUp: Add routing rules when interface comes up
# Forward traffic from VPN clients (10.100.0.0/24) to internal network (10.0.0.0/8)
# Enable IP forwarding on the server (sysctl -w net.ipv4.ip_forward=1)
PostUp = iptables -A FORWARD -i %i -j ACCEPT; iptables -t nat -A POSTROUTING -o eth0 -j MASQUERADE
# PostDown: Clean up routing rules when interface goes down
PostDown = iptables -D FORWARD -i %i -j ACCEPT; iptables -t nat -D POSTROUTING -o eth0 -j MASQUERADE

# [Peer] Configuration (Example Client 1)
[Peer]
# Client Public Key (Generate on client with `wg pubkey < client_private_key`)
PublicKey = CLIENT1_PUBLIC_KEY_HERE=
# Allowed IPs: IP assigned to this client in VPN network
AllowedIPs = 10.100.0.2/32

# [Peer] Configuration (Example Client 2 - Admin)
[Peer]
PublicKey = CLIENT2_PUBLIC_KEY_HERE=
AllowedIPs = 10.100.0.3/32

# Note:
# 1. Ensure UDP 51820 is open in firewall (iptables/UFW/AWS Security Group)
# 2. Ensure IP forwarding is enabled: echo "net.ipv4.ip_forward=1" >> /etc/sysctl.conf && sysctl -p
