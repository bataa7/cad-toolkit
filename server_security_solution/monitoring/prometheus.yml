# Prometheus Monitoring Configuration
# Path: /etc/prometheus/prometheus.yml

global:
  scrape_interval: 15s
  evaluation_interval: 15s

# Rule files (Alerting Rules)
rule_files:
  - "alert_rules.yml"

# Alertmanager Configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets: ['localhost:9093']

scrape_configs:
  # Prometheus Self-Monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Node Exporter (System Metrics)
  - job_name: 'node_exporter'
    static_configs:
      - targets: 
          - '10.10.0.10:9100'  # Web Server 1
          - '10.10.10.10:9100' # DB Server
          - '10.10.20.10:9100' # Bastion Host

  # MySQL Exporter (Database Metrics)
  - job_name: 'mysql'
    static_configs:
      - targets: ['10.10.10.10:9104']

  # Redis Exporter (Cache Metrics)
  - job_name: 'redis'
    static_configs:
      - targets: ['10.10.10.11:9121']

  # Blackbox Exporter (Ping/HTTP Checks)
  - job_name: 'blackbox_http'
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
        - http://10.10.0.10:80  # Web Internal Check
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: 127.0.0.1:9115  # Blackbox Exporter Address
