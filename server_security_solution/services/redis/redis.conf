# Redis 安全配置示例
# 路径：/etc/redis/redis.conf

# 1. 绑定内网 IP
# 默认可能监听 0.0.0.0，必须修改
bind 10.10.10.11

# 2. 启用认证
# 使用强密码 (建议随机生成至少 32 字符)
requirepass YourSuperStrongPasswordHere123!@#

# 3. 禁用危险命令
# 将这些命令重命名为空字符串以禁用
rename-command FLUSHALL ""
rename-command FLUSHDB ""
rename-command CONFIG ""
rename-command KEYS ""
rename-command SHUTDOWN ""
rename-command DEBUG ""
rename-command SAVE ""

# 4. 端口保护
# 默认端口 6379，建议更改为非标准端口以增加扫描难度
# port 16379

# 5. 超时设置
# 客户端空闲 N 秒后断开连接
timeout 300

# 6. 数据持久化策略
# RDB 快照频率
save 900 1
save 300 10
save 60 10000

# AOF 持久化 (推荐开启)
appendonly yes
appendfsync everysec

# 7. 内存限制
# 设置最大内存使用量，避免耗尽系统资源
maxmemory 2gb
# 内存淘汰策略 (LRU)
maxmemory-policy allkeys-lru

# 8. 关闭 Protected Mode (如果已绑定内网且有密码，可关闭以避免复杂网络下的问题，但建议保持默认开启并正确配置 bind)
# protected-mode yes
