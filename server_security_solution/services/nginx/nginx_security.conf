# Nginx 安全加固配置示例
# 放置于 /etc/nginx/nginx.conf 或 /etc/nginx/conf.d/default.conf

http {
    # 限制并发连接数
    limit_conn_zone $binary_remote_addr zone=addr:10m;
    
    server {
        listen 80;
        server_name your_domain.com;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl http2;
        server_name your_domain.com;

        # TLS 安全配置 (强制 TLS 1.3)
        ssl_protocols TLSv1.3;
        ssl_ciphers "TLS_AES_128_GCM_SHA256:TLS_AES_256_GCM_SHA384:TLS_CHACHA20_POLY1305_SHA256";
        ssl_prefer_server_ciphers off;
        
        # 证书路径
        ssl_certificate /etc/nginx/ssl/server.crt;
        ssl_certificate_key /etc/nginx/ssl/server.key;

        # 仅允许内网访问的路径 (例如管理后台)
        location /admin/ {
            # 允许 VPN 网段
            allow 10.100.0.0/16;
            # 允许运维网段
            allow 10.10.20.0/24;
            # 拒绝其他所有 (包括公网 IP)
            deny all;
            
            proxy_pass http://backend_admin_service;
        }

        # 仅允许内网访问 API
        location /api/internal/ {
            allow 10.0.0.0/8;
            deny all;
            proxy_pass http://internal_api_service;
        }
        
        # 公共 API (对外开放，但需经过 VPN 或特定的公网入口)
        location / {
            # 这里如果不限制 allow/deny，则默认允许所有
            # 如果是内网服务，建议在此处加上 allow/deny
            allow 10.0.0.0/8;
            deny all;
            
            proxy_pass http://frontend_service;
        }

        # 安全头部
        add_header X-Frame-Options DENY;
        add_header X-Content-Type-Options nosniff;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    }
}
