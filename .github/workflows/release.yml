name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --yes --no-progress

      - name: Build installer
        shell: pwsh
        run: |
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (!(Test-Path $iscc)) {
            throw "ISCC.exe not found at $iscc"
          }

          & $iscc "inno_setup\Scripts\setup.iss"

      - name: Create or update GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${env:GITHUB_REF_NAME}"
          $version = $tag.TrimStart("v")
          $asset = "inno_setup\Output\CADToolkit_Setup_v$version.exe"

          if (!(Test-Path $asset)) {
            throw "Release asset not found: $asset"
          }

          gh release view $tag *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $tag $asset --clobber
          }
          else {
            gh release create $tag $asset --title "CADToolkit $tag" --notes "Installer release for $tag."
          }
