[build]
  publish = "docs"
  command = "echo 'Static site - no build needed'"

# 重定向规则
[[redirects]]
  from = "/download"
  to = "https://github.com/bataa7/cad-toolkit/releases/latest"
  status = 302
  force = true

[[redirects]]
  from = "/github"
  to = "https://github.com/bataa7/cad-toolkit"
  status = 302
  force = true

[[redirects]]
  from = "/docs"
  to = "https://github.com/bataa7/cad-toolkit/blob/main/README.md"
  status = 302
  force = true

[[redirects]]
  from = "/issues"
  to = "https://github.com/bataa7/cad-toolkit/issues"
  status = 302
  force = true

# 404页面
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# 自定义头部
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

# 环境变量
[context.production.environment]
  NODE_VERSION = "18"

[context.deploy-preview.environment]
  NODE_VERSION = "18"

# 插件配置
[[plugins]]
  package = "@netlify/plugin-sitemap"
